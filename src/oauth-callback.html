<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FavsHub - OAuth</title>
</head>
<body>
<script>
(function() {
  var hash = window.location.hash.substring(1);
  var params = new URLSearchParams(hash);
  var accessToken = params.get('access_token');
  var expiresIn = params.get('expires_in');

  if (accessToken) {
    // 写入 localStorage，供扩展弹窗轮询读取
    var payload = JSON.stringify({
      access_token: accessToken,
      expires_in: expiresIn,
      timestamp: Date.now()
    });
    try {
      localStorage.setItem('baidu_pan_oauth_result', payload);
    } catch(e) {}

    // 同时尝试 postMessage（兼容旧方案）
    try {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({
          type: 'baidu-oauth-callback',
          access_token: accessToken,
          expires_in: expiresIn
        }, '*');
      }
    } catch(e) {}

    document.body.innerText = '授权成功，正在返回扩展...';
    setTimeout(function() { window.close(); }, 1500);
  } else {
    document.body.innerText = '授权失败：未获取到 token。';
  }
})();
</script>
</body>
</html>
