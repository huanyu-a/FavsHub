<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FavsHub - OAuth</title>
</head>
<body>
<script>
(function() {
  // 简化模式：access_token 在 hash fragment 中（#access_token=xxx）
  var params = new URLSearchParams(window.location.hash.substring(1));
  var accessToken = params.get('access_token');
  var expiresIn = params.get('expires_in');

  if (accessToken) {
    var payload = JSON.stringify({
      access_token: accessToken,
      expires_in: expiresIn,
      timestamp: Date.now()
    });

    try { localStorage.setItem('baidu_pan_oauth_result', payload); } catch(e) {}

    try {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ type: 'baidu-oauth-callback', access_token: accessToken, expires_in: expiresIn }, '*');
      }
    } catch(e) {}

    document.body.innerText = '授权成功，正在返回扩展...';
    setTimeout(function() { window.close(); }, 1500);
  } else {
    document.body.innerText = '授权失败：未获取到 token。';
  }
})();
</script>
</body>
</html>
